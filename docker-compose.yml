services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: zhenhuan-coze-agent:latest
    container_name: zhenhuan-coze-agent
    restart: unless-stopped
    ports:
      - "80:3000"
    environment:
      NODE_ENV: production
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
